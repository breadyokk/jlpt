<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日語練習</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F2EB;--bg2:#EDEAE0;--sf:#FDFCF8;--ink:#1C1A16;--ink2:#6B6456;--ink3:#A89F92;--red:#8B1A1A;--rl:#F7EDED;--green:#2D5233;--gl:#EBF2EC;--amb:#7A5C1E;--al:#F7F1E3;--brd:#DDD8CE;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:80px}
.hdr{background:var(--sf);border-bottom:1px solid var(--brd);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Noto Serif JP',serif;font-size:16px;letter-spacing:2px}
.hdr-r{display:flex;align-items:center;gap:7px}
.chip{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--brd);color:var(--ink2);background:var(--bg)}
.chip-red{background:var(--rl);color:var(--red);border-color:transparent}
.nav-a{font-size:12px;color:var(--ink2);text-decoration:none;padding:5px 10px;border:1px solid var(--brd);border-radius:8px;background:var(--sf)}
.nav-a:hover{background:var(--bg2)}
.prog-w{background:var(--brd);height:3px;position:sticky;top:49px;z-index:99}
.prog-f{height:3px;background:var(--ink);transition:width .5s}
.day-nav{display:flex;justify-content:space-between;align-items:center;padding:9px 20px;background:var(--bg2);border-bottom:1px solid var(--brd);font-size:12px}
.day-nav a{color:var(--ink2);text-decoration:none}.day-nav a:hover{color:var(--ink)}
.day-nav .cur{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3)}
.main{max-width:660px;margin:0 auto;padding:32px 18px}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:18px;margin-top:28px}
.ph:first-child{margin-top:0}
.pn{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);width:20px;text-align:right}
.pt{font-size:11px;font-weight:500;color:var(--ink2);letter-spacing:1.5px;text-transform:uppercase}
.pl{flex:1;height:1px;background:var(--brd)}
.ptm{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)}
.card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--r);padding:26px;margin-bottom:12px}
/* Grammar */
.why-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.why{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--al);color:var(--amb);font-weight:500}
.gtitle{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:300;letter-spacing:3px;margin-bottom:4px}
.gsub{font-size:13px;color:var(--ink2);margin-bottom:18px;line-height:1.7}
.divl{height:1px;background:var(--brd);margin:18px 0}
.gpat{font-family:'DM Mono',monospace;font-size:12px;background:var(--bg2);border-radius:6px;padding:11px 15px;margin-bottom:16px;line-height:2;color:var(--ink2)}
.gpat strong{color:var(--ink)}
.exlist{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.exitem{border-left:2px solid var(--brd);padding-left:12px}
.exjp{font-family:'Noto Serif JP',serif;font-size:15px;line-height:2;margin-bottom:2px}
.exjp em{font-style:normal;color:var(--red);font-weight:500}
.extr{font-size:12px;color:var(--ink3)}
.sc-lbl{font-size:11px;color:var(--ink3);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.sc-txt{font-family:'Noto Serif JP',serif;font-size:14px;line-height:2.3;background:var(--bg);border-radius:6px;padding:14px 16px;margin-bottom:8px}
.sc-txt em{font-style:normal;color:var(--red);font-weight:500}
.conf-lbl{font-size:11px;color:var(--red);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.ctable{width:100%;border-collapse:collapse;font-size:13px}
.ctable th{text-align:left;padding:7px 11px;background:var(--bg2);color:var(--ink2);font-size:11px;font-weight:500}
.ctable td{padding:9px 11px;border-top:1px solid var(--brd);line-height:1.7}
.ctable tr:last-child td{border-bottom:1px solid var(--brd)}
.ctable td:first-child{font-family:'Noto Serif JP',serif}
/* Kanji */
.k{position:relative;cursor:pointer;border-bottom:1px dashed var(--ink3);display:inline}
.k:hover{border-bottom-color:var(--red)}
.kp{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:8px;padding:9px 13px;font-size:12px;white-space:nowrap;z-index:200;line-height:1.8;box-shadow:0 4px 14px rgba(0,0,0,.2);pointer-events:all}
.kp::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink)}
.k.open .kp{display:block}
.kr{font-size:10px;color:#aaa}
.km{font-size:13px;font-weight:500}
.kbtn{display:inline-block;margin-top:5px;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.15);cursor:pointer;border:1px solid rgba(255,255,255,.3);transition:background .15s}
.kbtn:hover{background:rgba(255,255,255,.3)}
.kbtn.saved{background:#2D5233;border-color:#2D5233}
/* Questions */
.qnum{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);margin-bottom:9px}
.qctx{font-size:12px;color:var(--ink2);background:var(--al);border-radius:6px;padding:9px 13px;margin-bottom:12px;line-height:1.8;border-left:2px solid var(--amb)}
.qtext{font-family:'Noto Serif JP',serif;font-size:16px;line-height:2.3;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:7px}
.choice{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--brd);border-radius:8px;padding:11px 15px;cursor:pointer;transition:all .15s;background:var(--sf);font-family:'Noto Serif JP',serif;font-size:14px;color:var(--ink);text-align:left;line-height:1.7}
.choice:hover{border-color:var(--ink2);background:var(--bg)}
.choice.correct{border-color:var(--green);background:var(--gl);color:var(--green)}
.choice.wrong{border-color:var(--red);background:var(--rl);color:var(--red)}
.ckey{font-family:'DM Mono',monospace;font-size:11px;opacity:.5;flex-shrink:0;margin-top:3px}
.fill-in{width:100%;font-family:'Noto Serif JP',serif;font-size:16px;color:var(--ink);background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:13px 15px;outline:none;transition:border-color .15s;line-height:1.8}
.fill-in:focus{border-color:var(--ink);background:var(--sf)}
.fill-in:disabled{opacity:.7}
.hint{font-size:12px;color:var(--ink3);margin-top:7px}
.area-in{width:100%;font-family:'Noto Serif JP',serif;font-size:15px;color:var(--ink);background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:13px 15px;outline:none;resize:vertical;min-height:90px;transition:border-color .15s;line-height:2}
.area-in:focus{border-color:var(--ink);background:var(--sf)}
.area-in:disabled{opacity:.7}
.sitbox{background:var(--bg2);border-radius:8px;padding:14px 16px;font-size:14px;color:var(--ink2);line-height:1.9;margin-bottom:12px;border-left:2px solid var(--ink3);white-space:pre-line}
.multi-blank{margin-bottom:14px}
.multi-blank .qtext{font-size:15px;margin-bottom:8px}
.intro-note{font-size:13px;color:var(--ink2);margin-bottom:14px;font-style:italic}
ruby{ruby-align:center}
rt{font-size:10px;color:var(--ink3);font-family:'Noto Sans JP',sans-serif;font-weight:400;line-height:1}
.vtable td:first-child ruby rt{color:var(--ink3)}
width:100%;border-collapse:collapse;font-size:13px}
.vtable th{text-align:left;padding:7px 11px;background:var(--bg2);color:var(--ink2);font-size:11px;font-weight:500;border-bottom:1px solid var(--brd)}
.vtable td{padding:9px 11px;border-bottom:1px solid var(--brd);line-height:1.6;vertical-align:top}
.vtable tr:hover td{background:var(--bg)}
.vtable td:first-child{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:500}
.vtable td:nth-child(2){font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3)}
/* Reading */
.read-txt{font-family:'Noto Serif JP',serif;font-size:15px;line-height:2.6;background:var(--bg);border-radius:8px;padding:18px 20px;margin-bottom:18px;white-space:pre-line}
.read-txt em{font-style:normal;color:var(--red);font-weight:500}
/* Review */
.review-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)}
.review-item:last-child{border-bottom:none}
.review-jp{font-family:'Noto Serif JP',serif;font-size:15px;flex:1}
.review-note{font-size:12px;color:var(--green);white-space:nowrap}
/* Buttons */
.btn-row{display:flex;justify-content:flex-end;margin-top:14px;gap:9px}
.btn{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;padding:9px 20px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;background:var(--sf);color:var(--ink)}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-p:hover{opacity:.85}
.btn:disabled{opacity:.35;cursor:not-allowed}
/* Feedback */
.fb{display:none;margin-top:12px;border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.9;border-left:3px solid;animation:fi .25s ease}
.fb.on{display:block}
.fb.ok{background:var(--gl);border-color:var(--green)}
.fb.ng{background:var(--rl);border-color:var(--red)}
.fb-lbl{font-size:11px;font-weight:500;margin-bottom:3px;letter-spacing:.5px}
.fb.ok .fb-lbl{color:var(--green)}.fb.ng .fb-lbl{color:var(--red)}
.fb-body{color:var(--ink)}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* Loading dots */
.ld{display:none;align-items:center;gap:7px;margin-top:10px;font-size:13px;color:var(--ink2)}
.ld.on{display:flex}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--ink3);animation:bl 1.2s ease-in-out infinite;display:inline-block;margin-right:3px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
/* Results */
.res-card{display:none;background:var(--sf);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-top:20px}
.res-card.on{display:block;animation:fi .35s ease}
.res-hdr{padding:26px;border-bottom:1px solid var(--brd)}
.srow{display:flex;align-items:baseline;gap:5px;margin-bottom:12px}
.sbig{font-family:'Noto Serif JP',serif;font-size:50px;font-weight:300;line-height:1}
.sof{font-size:20px;color:var(--ink3)}.stag{font-size:14px;color:var(--ink2);margin-left:9px}
.ebl{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:5px}
.ebar{height:6px;background:var(--brd);border-radius:3px;overflow:hidden}
.efil{height:100%;border-radius:3px;transition:width .7s}
.res-body{padding:0 26px 24px}
.rrow{padding:14px 0;border-bottom:1px solid var(--brd)}
.rrow:last-child{border-bottom:none}
.rlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);margin-bottom:5px}
.vrd{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;margin-bottom:6px}
.vok{background:var(--gl);color:var(--green)}.vng{background:var(--rl);color:var(--red)}
.ranalysis{font-size:13px;color:var(--ink2);line-height:1.9;background:var(--bg);border-radius:6px;padding:11px 13px;margin-top:5px}
.dhint{margin-top:14px;font-size:13px;padding:11px 13px;border-radius:8px}
.dhint.up{background:var(--gl);color:var(--green)}.dhint.down{background:var(--al);color:var(--amb)}
/* Download / obs */
.dl-btn{display:none;align-items:center;gap:7px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink2);background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:9px 15px;cursor:pointer;transition:all .15s;margin-top:14px}
.dl-btn:hover{border-color:var(--ink2);color:var(--ink)}
.dl-btn.saved{border-color:var(--green);color:var(--green);background:var(--gl)}
/* Vocab bar */
.vbar{display:none;position:fixed;bottom:18px;right:18px;background:var(--ink);color:#fff;border-radius:10px;padding:9px 15px;font-size:13px;z-index:300;box-shadow:0 4px 14px rgba(0,0,0,.2);align-items:center;gap:9px}
.vbar.on{display:flex}
.vcnt{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
.vdl{font-size:11px;color:rgba(255,255,255,.6);cursor:pointer;text-decoration:underline}
.vdl:hover{color:#fff}
/* Progress link */
.prog-link{font-size:12px;color:var(--ink2);text-align:center;margin-top:16px}
.prog-link a{color:var(--ink2);text-decoration:underline}
/* Day 7 stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-c{background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:14px}
.stat-lbl{font-size:11px;color:var(--ink3);margin-bottom:5px;font-family:'DM Mono',monospace;text-transform:uppercase}
.stat-v{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:300}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.gbr-row{padding:12px 0;border-bottom:1px solid var(--brd)}
.gbr-row:last-child{border-bottom:none}
.gbr-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.gbr-name{font-family:'Noto Serif JP',serif;font-size:14px}
.gbr-pct{font-size:12px;color:var(--ink2)}
.gbr{height:5px;background:var(--brd);border-radius:3px;overflow:hidden}
.gbrf{height:100%;border-radius:3px}
</style>
</head>
<body>

<header class="hdr">
  <span class="logo">日語練習</span>
  <div class="hdr-r">
    <span class="chip" id="chip-wk">WEEK 1 · DAY 1</span>
    <span class="chip" id="chip-tm">週一 · 30 min</span>
    <span class="chip chip-red" id="chip-lv">N3</span>
    <a class="nav-a" href="progress.html">進度 →</a>
  </div>
</header>
<div class="prog-w"><div class="prog-f" id="pbar" style="width:10%"></div></div>
<div class="day-nav">
  <a id="nav-prev" href="#" style="visibility:hidden">← 上一天</a>
  <span class="cur" id="nav-cur">Day 1 / 90</span>
  <a id="nav-next" href="#">下一天 →</a>
</div>

<div class="main" id="root"></div>

<div class="vbar" id="vbar">
  <span class="vcnt" id="vcnt">0</span>
  <span style="color:rgba(255,255,255,.7)">個單字已加入</span>
  <span class="vdl" onclick="dlVocab()">下載單字本</span>
</div>

<script>
// ═══════════════════════════════════════════════════
// KANJI DICTIONARY
// ═══════════════════════════════════════════════════
const KD = {
  '練習':['れんしゅう','練習・練習'],
  '漢字':['かんじ','漢字・中文漢字'],
  '内容':['ないよう','内容・內容'],
  '全然':['ぜんぜん','全然・完全不'],
  '続けた':['つづけた','続ける・持續'],
  '続け':['つづけ','続ける・持續'],
  '結果':['けっか','結果・結果'],
  '簡単':['かんたん','簡単・簡單'],
  '会話':['かいわ','会話・對話'],
  '勉強':['べんきょう','勉強・學習'],
  '聞き取れる':['きとれる','聞き取れる・能夠聽懂'],
  '健康':['けんこう','健康・健康'],
  '意識的':['いしきてき','意識的・有意識地'],
  '日本語':['にほんご','日本語・日語'],
  '三年間':['さんねんかん','三年間・三年期間'],
  '自然':['しぜん','自然・自然地'],
  '理解':['りかい','理解・理解'],
  '合格':['ごうかく','合格・通過考試'],
  '試験':['しけん','試験・考試'],
  '目標':['もくひょう','目標・目標'],
  '約束':['やくそく','約束・約定'],
  '友達':['ともだち','友達・朋友'],
  '電池':['でんち','電池・電池'],
  '宿題':['しゅくだい','宿題・作業'],
  '大切':['たいせつ','大切・重要'],
  '以上':['いじょう','以上・以上'],
  '以下':['いか','以下・以下'],
  '理由':['りゆう','理由・理由'],
  '目的':['もくてき','目的・目的'],
  '経験':['けいけん','経験・經驗'],
  '単語':['たんご','単語・單字'],
  '覚え':['おぼえ','覚える・記住'],
  '表現':['ひょうげん','表現・表達'],
  '変わる':['かわる','変わる・改變'],
  '増える':['ふえる','増える・增加'],
  '慣れる':['なれる','慣れる・習慣'],
  '諦める':['あきらめる','諦める・放棄'],
  '上達':['じょうたつ','上達する・進步'],
  '確認':['かくにん','確認する・確認'],
  '正確':['せいかく','正確・正確'],
  '丁寧':['ていねい','丁寧・仔細'],
};

function kify(text) {
  let out = text;
  for (const [k, [r, m]] of Object.entries(KD)) {
    const re = new RegExp(k, 'g');
    out = out.replace(re, `<span class="k" onclick="toggleK(this)" data-r="${r}" data-m="${m}">${k}</span>`);
  }
  return out;
}

// ═══════════════════════════════════════════════════
// CURRICULUM DATA – Week 1 (Days 1–7)
// ═══════════════════════════════════════════════════
const C = {

  1: {
    meta:{week:1,wd:'週一',topic:'〜ようになる',time:30,lv:'N3'},
    parts:[
      {type:'grammar',num:'01',label:'今日語法',time:10,
        title:'〜ようになる',
        why:['N3 必考 ★★★★★','日常高頻使用','易混淆：ようにする'],
        sub:'表示能力或習慣的<strong>自然變化</strong>。「變得能夠…」「開始…」',
        pat:['<strong>動詞辭書形</strong> ＋ ようになる　→　能力出現（變得能做）','<strong>動詞ない形</strong> ＋ ようになる　→　習慣停止（變得不做）'],
        ex:[
          {jp:'練習したら、漢字が書ける<em>ようになった</em>。',tr:'練習後，變得能夠寫漢字了。'},
          {jp:'子どもの頃は魚が嫌いだったが、今は食べられる<em>ようになった</em>。',tr:'小時候討厭魚，現在變得能吃了。'},
          {jp:'毎日ニュースを聞いていたら、だんだん内容が分かる<em>ようになってきた</em>。',tr:'每天聽新聞，漸漸能理解內容了。'}
        ],
        scene:'田中さんは去年まで、英語が全然話せませんでした。でも、毎日30分練習を続けた結果、今では簡単な会話ができる<em>ようになりました</em>。',
        conf_cols:['語法','性質','例','中文'],
        conf_rows:[
          ['ようになる','自然發生的變化','食べられるようになった','變得能夠…'],
          ['ようにする','自己刻意去做','野菜を食べるようにした','讓自己去做…']
        ]
      },
      {type:'qs',num:'02',label:'情境選擇',time:5,items:[
        {t:'choice',id:'q_1_2a',num:'問題 2-1',
          ctx:'情境：Aさんは健康のために、意識的に毎朝ジョギングをすることにした。（A 為了健康，有意識地決定每天早上慢跑。）',
          text:'Aさんは毎朝ジョギングする＿＿＿。',
          opts:['ようになりました（自然養成的習慣）','ようにしました（刻意決定去做）','ことになりました（因外部決定）'],
          ans:1,
          ok:'正確！情境說「意識的に」→ 刻意決定的行為，所以用ようにする。',

function toggleK(el){
  const was=el.classList.contains('open');
  document.querySelectorAll('.k.open').forEach(k=>k.classList.remove('open'));
  if(!was){
    let p=el.querySelector('.kp');
    if(!p){p=document.createElement('div');p.className='kp';el.appendChild(p);}
    const sent=el.closest('.exjp,.sc-txt,.qtext,.read-txt,.multi-blank,.sitbox')||el.parentElement;
    const ex=sent?sent.textContent.trim().slice(0,55):'';
    p.innerHTML=`<div class="kr">${el.dataset.r}</div><div class="km">${el.dataset.m}</div><div class="kbtn" id="kb-${el.dataset.r}" onclick="addV(event,this,'${el.dataset.m}','${el.dataset.r}',\`${ex.replace(/`/g,"'")}\`)">＋ 加入單字本</div>`;
    el.classList.add('open');
  }
}
document.addEventListener('click',e=>{if(!e.target.closest('.k')&&!e.target.closest('.kp'))document.querySelectorAll('.k.open').forEach(k=>k.classList.remove('open'));});

function addV(ev,btn,m,r,ex){
  ev.stopPropagation();
  if(btn.classList.contains('saved'))return;
  btn.textContent='✓ 已加入';btn.classList.add('saved');
  if(!ST.vocab.find(v=>v.r===r)) ST.vocab.push({m,r,ex,date:new Date().toISOString().slice(0,10)});
  document.getElementById('vcnt').textContent=ST.vocab.length;
  document.getElementById('vbar').classList.add('on');
}
function dlVocab(){
  if(!ST.vocab.length)return;
  const today=new Date().toISOString().slice(0,10);
  let md=`---\ndate: ${today}\ntype: 單字本\ntag: #單字 #Week1\n---\n\n# ${today} 單字本\n\n| 單字 | 讀音 | 意思 | 例句 |\n|------|------|------|------|\n`;
  ST.vocab.forEach(v=>{const w=v.m.split('・')[0];const mn=v.m.split('・')[1]||'';md+=`| ${w} | ${v.r} | ${mn} | ${v.ex} |\n`;});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));a.download=`${today}-單字本.md`;a.click();
}

function render(){
  const data=C[DAY];
  if(!data){document.getElementById('root').innerHTML=`<div class="card"><p>Day ${DAY} 的內容準備中。</p></div>`;return;}
  let html='';
  let pIdx=0;
  data.parts.forEach(part=>{
    pIdx++;
    html+=`<div class="ph"><span class="pn">${part.num||String(pIdx).padStart(2,'0')}</span><span class="pt">${part.label}</span><div class="pl"></div>${part.time?`<span class="ptm">${part.time} min</span>`:''}` +'</div>';
    html+=renderPart(part);
  });
  html+=buildSubmitSection();
  document.getElementById('root').innerHTML=html;
  document.getElementById('pbar').style.width='20%';
  checkSubmitReady();
}

function renderPart(p){
  if(p.type==='grammar') return renderGrammar(p);
  if(p.type==='review') return renderReview(p);
  if(p.type==='vocab') return renderVocab(p);
  if(p.type==='reading') return renderReading(p);
  if(p.type==='qs') return renderQs(p);
  if(p.type==='day7') return renderDay7();
  return '';
}

function renderGrammar(p){
  const whys=p.why.map(w=>`<span class="why">${w}</span>`).join('');
  const pats=p.pat.map(pt=>`${pt}`).join('<br>');
  const exs=p.ex.map(e=>`<div class="exitem"><div class="exjp">${kify(e.jp)}</div><div class="extr">（${e.tr}）</div></div>`).join('');
  let conf='';
  if(p.conf_cols&&p.conf_rows){
    const ths=p.conf_cols.map(c=>`<th>${c}</th>`).join('');
    const trs=p.conf_rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===0?' style="font-family:\'Noto Serif JP\',serif"':''}>${c}</td>`).join('')}</tr>`).join('');
    conf=`<div class="conf-lbl">⚠ 混淆提醒</div><table class="ctable"><tr>${ths}</tr>${trs}</table>`;
  }
  return `<div class="card"><div class="why-row">${whys}</div><div class="gtitle">${p.title}</div><div class="gsub">${p.sub}</div><div class="gpat">${pats}</div><div class="divl"></div><div class="sc-lbl">例句</div><div class="exlist">${exs}</div><div class="sc-lbl">使用場景</div><div class="sc-txt">${kify(p.scene)}</div><div class="divl"></div>${conf}</div>`;
}

function renderReview(p){
  const items=p.items.map(it=>`<div class="review-item"><div class="review-jp">${kify(it.jp)}</div><div class="review-note">${it.note}</div></div>`).join('');
  return `<div class="card"><div style="font-size:13px;color:var(--ink2);margin-bottom:14px">${p.note}</div>${items}</div>`;
}

// ── Furigana: wrap kanji with ruby reading ──
function furi(word, reading) {
  return `<ruby>${word}<rt>${reading}</rt></ruby>`;
}

// Auto-add furigana for known kanji in a string (for choice options & ctx)
function furiAuto(text) {
  let out = text;
  for (const [k, [r]] of Object.entries(KD)) {
    const re = new RegExp(k, 'g');
    out = out.replace(re, `<ruby>${k}<rt>${r}</rt></ruby>`);
  }
  return out;
}

function renderVocab(p){
  const rows=p.words.map(w=>`<tr>
    <td><ruby style="font-family:'Noto Serif JP',serif;font-size:16px;font-weight:500">${w.w}<rt style="font-size:11px;color:var(--ink3)">${w.r}</rt></ruby></td>
    <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3)">${w.r}</td>
    <td>${w.pos}</td>
    <td>${w.m}</td>
    <td style="color:var(--ink2)">${furiAuto(w.ex)}</td>
  </tr>`).join('');
  return `<div class="card"><div style="font-size:13px;color:var(--ink2);margin-bottom:14px">${p.note}</div><table class="vtable"><tr><th>單字</th><th>讀音</th><th>詞性</th><th>中文</th><th>例句</th></tr>${rows}</table></div>`;
}

function renderQ(q){
  if(q.t==='choice') return renderChoice(q);
  if(q.t==='fill') return renderFill(q);

  statHtml+=`<div class="stat-c"><div class="stat-lbl">完成天數</div><div class="stat-v">${done}/6</div></div>`;
  statHtml+=`<div class="stat-c"><div class="stat-lbl">平均正確率</div><div class="stat-v">${avgAcc}%</div></div>`;
  statHtml+=`<div class="stat-c"><div class="stat-lbl">單字累計</div><div class="stat-v">${totalVocab}個</div></div>`;
  const daysLeft=Math.max(0,Math.floor((new Date('2025-07-05')-new Date())/86400000));
  statHtml+=`<div class="stat-c"><div class="stat-lbl">距N2考試</div><div class="stat-v">${daysLeft}天</div></div>`;
  statHtml+='</div>';
  statHtml+='<div class="divl"></div><div class="sc-lbl">語法掌握度</div>';
  gkeys.forEach(g=>{
    const errs=days.filter(d=>prog[`day_${d}`]?.grammar_errors?.[g]===true).length;
    const practiced=days.filter(d=>prog[`day_${d}`]?.grammar_errors!==undefined).length;
    const acc=practiced>0?Math.round((1-errs/Math.max(practiced,1))*100):0;
    const col=acc>=80?'var(--green)':acc>=50?'var(--amb)':'var(--red)';
    statHtml+=`<div class="gbr-row"><div class="gbr-head"><span class="gbr-name">${g}</span><span class="gbr-pct">${practiced>0?acc+'%':'未練習'}</span></div><div class="gbr"><div class="gbrf" style="width:${acc}%;background:${col}"></div></div></div>`;
  });
  statHtml+='</div>';

  // Weakest grammar re-practice
  let weakestG=null,lowestAcc=101;
  gkeys.forEach(g=>{
    const errs=days.filter(d=>prog[`day_${d}`]?.grammar_errors?.[g]===true).length;
    const practiced=days.filter(d=>prog[`day_${d}`]?.completed).length;
    if(practiced>0){const acc=Math.round((1-errs/Math.max(practiced,1))*100);if(acc<lowestAcc){lowestAcc=acc;weakestG=g;}}
  });

  let weakHtml='';
  if(weakestG&&lowestAcc<80){
    weakHtml=`<div class="card" style="border-color:var(--red)"><div class="sc-lbl" style="color:var(--red)">⚠ 弱項集中補強：${weakestG}（正確率 ${lowestAcc}%）</div><div style="font-size:13px;color:var(--ink2);margin-bottom:14px">根據本週錯誤率，請重新練習這個語法。</div>`;
    const repQ={t:'compose',id:'q_7_weak',num:'補強造句',sit:`請用「${weakestG}」造出 2 句自然的日文句子。`,ph:`${weakestG}を使って…`,req:weakestG.includes('ように')?['ように','よう']:[weakestG.replace('〜','')],good:[],ex:'',gkey:weakestG};
    weakHtml+=renderCompose(repQ);
    weakHtml+='</div>';
  }

  return statHtml+weakHtml;
}

function buildSubmitSection(){
  if(DAY===7) return `<div class="btn-row" style="margin-top:20px"><a class="btn nav-a" href="progress.html">查看進度儀表板 →</a></div>`;
  return `<div class="btn-row" style="margin-top:24px"><button class="btn btn-p" id="sub-btn" onclick="submitAll()" disabled>提交全部答案 →</button></div><div class="res-card" id="res-card"><div class="res-hdr"><div class="srow"><span class="sbig" id="sbig">–</span><span class="sof" id="sof">/ 0</span><span class="stag" id="stag"></span></div><div class="ebl"><span>正確率</span><span id="epct">–</span></div><div class="ebar"><div class="efil" id="efil" style="width:0%"></div></div></div><div class="res-body" id="res-body"></div></div><button class="dl-btn" id="dl-btn" onclick="dlRecord()"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>下載今日學習紀錄 (.md)</button><div class="prog-link" id="prog-link" style="display:none"><a href="progress.html">查看進度儀表板 →</a></div>`;
}

// ═══════════════════════════════════════════════════
// INTERACTION HANDLERS
// ═══════════════════════════════════════════════════
function pickChoice(id,idx,correct){
  if(id in ST.choices) return;
  ST.choices[id]=idx;
  const btns=document.querySelectorAll(`[id^="${id}_"]`);
  btns.forEach(b=>b.onclick=null);
  btns[idx].classList.add(idx===correct?'correct':'wrong');
  if(idx!==correct) btns[correct].classList.add('correct');

  const qData=findQ(id);
  const ok=idx===correct;
  const msg=ok?qData.ok:(qData.ng[idx]||'請再看看混淆提醒表。');
  showFb(`fb_${id}`,ok,msg);
  checkSubmitReady();
}

function onFillInput(id){
  const v=document.getElementById(id).value.trim();
  const cfm=document.getElementById(`cfm_${id}`);
  if(cfm) cfm.disabled=v.length<1;
  checkSubmitReady();
}

function confirmFill(id){
  const v=document.getElementById(id)?.value.trim();
  if(!v) return;
  const q=findQ(id);
  if(!q) return;
  const ok=q.ans.some(a=>v.includes(a));
  ST.fills[id]={ok,v};
  ST.confirmed[id]=true;
  const inp=document.getElementById(id);
  const cfm=document.getElementById(`cfm_${id}`);
  if(inp) inp.disabled=true;
  if(cfm){cfm.disabled=true;cfm.textContent=ok?'✓ 正確':'✗ 確認完畢';cfm.style.background=ok?'var(--green)':'var(--red)';cfm.style.borderColor=cfm.style.background;}
  showFb(`fb_${id}`,ok,ok?q.ok:`${q.ng}<br><br>💡 你的答案：${v}`);
  checkSubmitReady();
}

function onTextarea(id){
  ST.composes[id]=document.getElementById(id)?.value.trim()||'';
  checkSubmitReady();
}

function checkSubmitReady(){
  const btn=document.getElementById('sub-btn');
  if(!btn) return;
  const data=C[DAY];if(!data) return;
  let allDone=true;
  data.parts.forEach(p=>{
    if(p.type==='qs'||p.type==='reading'){
      const items=p.items||[];
      items.forEach(q=>{
        if(q.t==='choice'&&!(q.id in ST.choices)) allDone=false;
        if(q.t==='fill'&&!ST.confirmed[q.id]) allDone=false;
        if((q.t==='compose'||q.t==='understand'||q.t==='open')&&(!ST.composes[q.id]||ST.composes[q.id].length<3)) allDone=false;
      });
    }
  });
  btn.disabled=!allDone;
}

// ═══════════════════════════════════════════════════
// GRADING
// ═══════════════════════════════════════════════════
function gradeCompose(q,val){
  if(!val||val.length<2) return {ok:false,msg:'未作答。'};
  const hasReq=q.req.some(r=>val.includes(r));
  const goodCount=(q.good||[]).filter(g=>val.includes(g)).length;
  if(!hasReq) return {ok:false,msg:`「${q.req[0]}」が見当たりません。<br><br>✏️ 例：<em>${q.ex}</em><br><br>💡 ${q.gkey} を使って文を作ってください。`};
  if(goodCount>=2) return {ok:true,msg:`よくできました！文の構造も自然です。<br><br>💡 参考：<em>${q.ex}</em>`};
  return {ok:true,msg:`「${q.req[0]}」を正しく使えています。<br><br>✏️ 参考：<em>${q.ex}</em>`};
}

function gradeUnderstand(q,val){
  if(!val||val.length<2) return {ok:false,msg:'未作答。'};
  const l=val.toLowerCase();
  const matched=q.pairs&&q.pairs.some(pair=>pair.every(k=>l.includes(k)||val.includes(k)));
  const strong=q.strong&&q.strong.some(k=>val.includes(k));
  if(matched||strong) return {ok:true,msg:`正解！核心の違いを理解しています。<br><br>💡 ${q.tip}`};
  return {ok:false,msg:`もう少し！<br><br>${q.expl}<br><br>💡 ${q.tip}`};
}

function gradeOpen(q,val){
  if(!val||val.length<2) return {ok:false,msg:'未作答。'};
  const hit=q.ans_kw&&q.ans_kw.some(k=>val.includes(k));
  if(hit) return {ok:true,msg:`キーワードが含まれています。<br><br>📝 参考答案：${q.model}`};
  return {ok:false,msg:`もう一度考えてみましょう。<br><br>📝 参考答案：${q.model}`};
}

// ═══════════════════════════════════════════════════
// SUBMIT
// ═══════════════════════════════════════════════════
async function submitAll(){
  const btn=document.getElementById('sub-btn');
  btn.disabled=true;
  document.getElementById('pbar').style.width='70%';

  const data=C[DAY];
  const results=[];

  // Collect all gradeable questions
  const allQs=[];
  data.parts.forEach(p=>{
    if(p.type==='qs'||p.type==='reading') (p.items||[]).forEach(q=>allQs.push(q));
  });

  allQs.forEach(q=>{
    if(q.t==='choice'){
      const idx=ST.choices[q.id]??-1;
      const ok=idx===q.ans;
      const userAns=idx>=0?`選 ${String.fromCharCode(65+idx)}：${q.opts[idx]}`:'（未作答）';
      const correctAns=`選 ${String.fromCharCode(65+q.ans)}：${q.opts[q.ans]}`;
      results.push({id:q.id,label:q.num,ok,userAns,correctAns,note:ok?null:(q.ng[idx]||'請再看看混淆提醒表。'),type:'choice'});
    }
    if(q.t==='fill'){
      const r=ST.fills[q.id];
      const userAns=r?.v||'（未作答）';
      const correctAns=q.ans[0];
      results.push({id:q.id,label:q.num,ok:r?.ok??false,userAns,correctAns,note:r?.ok?null:q.ng,type:'fill',question:q.text});
    }
    if(q.t==='compose'){
      const v=ST.composes[q.id]||'';
      const r=gradeCompose(q,v);
      showFb(`fb_${q.id}`,r.ok,r.msg);
      results.push({id:q.id,label:q.num||'造句',ok:r.ok,userAns:v||'（未作答）',correctAns:q.ex,note:r.ok?null:r.msg,gkey:q.gkey,type:'compose',sit:q.sit});
    }
    if(q.t==='understand'){
      const v=ST.composes[q.id]||'';
      const r=gradeUnderstand(q,v);
      showFb(`fb_${q.id}`,r.ok,r.msg);
      results.push({id:q.id,label:q.num,ok:r.ok,userAns:v||'（未作答）',correctAns:q.expl,note:r.ok?null:r.msg,type:'understand'});
    }
    if(q.t==='open'){
      const v=ST.composes[q.id]||'';
      const r=gradeOpen(q,v);
      showFb(`fb_${q.id}`,r.ok,r.msg);
      results.push({id:q.id,label:q.num,ok:r.ok,userAns:v||'（未作答）',correctAns:q.model,note:r.ok?null:r.msg,type:'open',question:q.text});
    }
  });

  document.getElementById('pbar').style.width='100%';
  showResults(results);
  saveProgress(results);
}

function showResults(results){
  const total=results.length;
  const correct=results.filter(r=>r.ok).length;
  const pct=total>0?Math.round(correct/total*100):0;

  document.getElementById('sbig').textContent=correct;
  document.getElementById('sof').textContent=`/ ${total}`;
  document.getElementById('stag').textContent=['需要加強 💪','繼續努力 📖','不錯！ 👍','很好！ ⭐','完美！ 🎉'][Math.min(Math.round(correct/total*4),4)];
  document.getElementById('epct').textContent=pct+'%';
  const ef=document.getElementById('efil');
  ef.style.width=pct+'%';
  ef.style.background=pct>=80?'var(--green)':pct>=60?'var(--amb)':'var(--red)';

  let html='';
  results.forEach(r=>{
    html+=`<div class="rrow"><div class="rlbl">${r.label}</div><div class="vrd ${r.ok?'vok':'vng'}">${r.ok?'✓ 正確':'✗ 錯誤'}</div>${!r.ok&&r.note?`<div class="ranalysis">${r.note}</div>`:''}</div>`;
  });
  const dhint=document.createElement('div');
  dhint.className=`dhint ${pct>=80?'up':'down'}`;
  dhint.textContent=pct>=80?'🎉 正確率高！下次練習難度提升一格。':'📌 週日複盤會針對錯誤率最高的語法重練。難度維持不變。';
  document.getElementById('res-body').innerHTML=html;
  document.getElementById('res-body').appendChild(dhint);
  document.getElementById('res-card').classList.add('on');
  document.getElementById('dl-btn').style.display='flex';
  document.getElementById('prog-link').style.display='block';
  document.getElementById('res-card').scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════════════
// PROGRESS SAVE / LOAD
// ═══════════════════════════════════════════════════
function saveProgress(results){
  const total=results.length,correct=results.filter(r=>r.ok).length;
  const pct=total>0?Math.round(correct/total*100):0;
  const prog=getProgress();
  const gerrs={};
  results.forEach(r=>{if(r.gkey) gerrs[r.gkey]=!r.ok;});
  // Save full detail for each result (including user input)
  const details=results.map(r=>({
    label:r.label,
    ok:r.ok,
    type:r.type,
    userAns:r.userAns,
    correctAns:r.correctAns,
    note:r.note,
    question:r.question||r.sit||''
  }));
  prog[`day_${DAY}`]={
    completed:true,score:correct,total,pct,
    date:new Date().toISOString().slice(0,10),
    vocab:ST.vocab.length,
    grammar_errors:gerrs,
    errors:results.filter(r=>!r.ok).map(r=>r.label),
    details
  };
  localStorage.setItem('n2_progress',JSON.stringify(prog));
}

function getProgress(){
  try{return JSON.parse(localStorage.getItem('n2_progress')||'{}');}catch(e){return {};}
}

// ═══════════════════════════════════════════════════
// DOWNLOAD RECORD
// ═══════════════════════════════════════════════════
function dlRecord(){
  const today=new Date().toISOString().slice(0,10);
  const prog=getProgress();
  const d=prog[`day_${DAY}`];
  if(!d) return;

  const correct=d.score, total=d.total, pct=d.pct;
  const details=d.details||[];
  const wrongItems=details.filter(r=>!r.ok);
  const rightItems=details.filter(r=>r.ok);

  // ── Frontmatter ──
  let md=`---
date: ${today}
day: ${DAY}
topic: ${META.topic}
score: ${correct}/${total}
accuracy: ${pct}%
tag: #N3語法 #Week${META.week}
---

# ${today} · Day ${DAY} · ${META.topic}

## 練習結果總覽

| 題目 | 結果 | 我的答案 |
|------|------|---------|
`;
  details.forEach(r=>{
    const ans=(r.userAns||'').replace(/\n/g,' ').slice(0,60);
    md+=`| ${r.label} | ${r.ok?'○ 正確':'✗ 錯誤'} | ${ans} |\n`;
  });
  md+=`\n**分數：${correct}/${total}（${pct}%）**\n`;

  // ── 錯題詳細 ──
  if(wrongItems.length>0){
    md+=`\n---\n\n## 錯題詳細分析（${wrongItems.length} 題）\n`;
    wrongItems.forEach((r,i)=>{
      md+=`\n### ${i+1}. ${r.label}\n`;
      if(r.question) md+=`**題目：** ${r.question.replace(/＿+/g,'___')}\n\n`;
      md+=`**我的答案：**\n> ${(r.userAns||'（未作答）').replace(/\n/g,'\n> ')}\n\n`;
      md+=`**正確答案：**\n> ${(r.correctAns||'').replace(/\n/g,'\n> ')}\n\n`;
      if(r.note){
        const cleanNote=r.note.replace(/<[^>]+>/g,'').replace(/✏️/g,'').trim();
        md+=`**解析：** ${cleanNote}\n`;
      }
    });
  }

  // ── 正確題目（保留記錄）──
  if(rightItems.length>0){
    md+=`\n---\n\n## 正確題目（${rightItems.length} 題）\n`;
    rightItems.forEach(r=>{
      const ans=(r.userAns||'').replace(/\n/g,' ').slice(0,80);
      md+=`- **${r.label}**：${ans}\n`;
    });
  }

  // ── 單字本 ──
  if(ST.vocab&&ST.vocab.length>0){
    md+=`\n---\n\n## 今日單字本（${ST.vocab.length} 個）\n\n| 單字 | 讀音 | 意思 | 來源 |\n|------|------|------|------|\n`;
    ST.vocab.forEach(v=>{
      const w=v.m.split('・')[0];
      const mn=v.m.split('・')[1]||'';
      const src=(v.ex||'').slice(0,40);
      md+=`| ${w} | ${v.r} | ${mn} | ${src} |\n`;
    });
  }

  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown;charset=utf-8'}));
  a.download=`${today}-Day${DAY}-${META.topic}.md`;
  a.click();

  const btn=document.getElementById('dl-btn');
  btn.classList.add('saved');
  btn.innerHTML='<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>已下載！拖入 Obsidian 資料夾';
  setTimeout(()=>{
    btn.classList.remove('saved');
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>下載今日學習紀錄 (.md)';
  },3000);
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function showFb(elId,ok,msg){
  const el=document.getElementById(elId);
  if(!el) return;
  el.className=`fb on ${ok?'ok':'ng'}`;
  el.innerHTML=`<div class="fb-lbl">${ok?'✓ 正確':'✗ 錯誤'}</div><div class="fb-body">${msg}</div>`;
}

function findQ(id){
  const data=C[DAY];if(!data) return null;
  for(const p of data.parts){
    const items=p.items||[];
    for(const q of items){if(q.id===id) return q;}
  }
  return null;
}

render();
